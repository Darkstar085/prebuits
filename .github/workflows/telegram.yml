name: Telegram Delivery

on:
  workflow_run:
    workflows: ["Build and Release"]
    types: [completed]

concurrency:
  group: prebuilts-telegram-${{ github.ref }}
  cancel-in-progress: true

jobs:
  send-telegram:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      API_ID: ${{ secrets.TELEGRAM_API_ID }}
      API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
      SESSION: ${{ secrets.TELEGRAM_SESSION }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip jq
          pip3 install pyrogram tgcrypto

      - name: Determine release tag
        run: echo "TAG=prebuilts-${{ github.event.workflow_run.id }}" >> $GITHUB_ENV

      - name: Get release assets
        run: |
          url="https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}"
          resp=$(curl -s -H "Accept: application/vnd.github+json" "$url" || true)

          if [ -z "$resp" ] || echo "$resp" | grep -q '"Not Found"'; then exit 0; fi

          echo "$resp" | jq -r '.assets[] | select(.name|test("_v.*\\.(apk|exe)$")) | [.name, .browser_download_url] | @tsv' > urls.tsv

          if [ ! -s urls.tsv ]; then exit 0; fi

      - name: Download APPs
        if: success() && hashFiles('urls.tsv') != ''
        run: |
          mkdir -p dl
          while IFS=$'\t' read -r name url; do
            curl -L -o "dl/$name" "$url"
          done < urls.tsv

      - name: Upload to Telegram
        if: success() && hashFiles('dl/*') != ''
        run: |
          python3 - <<'PY'
import os
import glob
import re
import asyncio
import subprocess
from asyncio import Semaphore
from pyrogram import Client
from pyrogram.errors import FloodWait, RPCError

CHUNK_SIZE = 1024 * 1024
PARALLEL_UPLOADS = 4
RETRIES = 5
RETRY_DELAY = 5

api_id = int(os.environ['API_ID'])
api_hash = os.environ['API_HASH']
session = os.environ['SESSION']
bot_token = os.environ['TELEGRAM_TOKEN']
chat_id = os.environ['TELEGRAM_CHAT_ID']

chat = int(chat_id) if chat_id.lstrip("-").isdigit() else chat_id

def normalize_name(name):
    base = re.split(r'_v|-v', name, maxsplit=1)[0]
    return re.sub(r'[ .-]+', '', base.lower())

captions = {}
if os.path.exists("captions.txt"):
    with open("captions.txt", encoding="utf-8") as f:
        blocks = f.read().strip().split("----")
        for block in blocks:
            block = block.strip()
            if not block:
                continue
            lines = block.splitlines()
            m = re.search(r"File name</b> – ([^\n]+)", lines[0])
            if m:
                key = normalize_name(m.group(1))
                captions[key] = "\n".join(lines[1:])

def find_caption(filename):
    norm = normalize_name(filename)
    if norm in captions:
        return captions[norm]
    for key in captions:
        if norm.startswith(key) or key.startswith(norm):
            return captions[key]
    return ""

files = sorted(glob.glob("dl/*.apk") + glob.glob("dl/*.exe"))
if not files:
    raise SystemExit(0)

small_files = [f for f in files if os.path.getsize(f) <= 48 * 1024 * 1024]
large_files = [f for f in files if os.path.getsize(f) > 48 * 1024 * 1024]

for f in small_files:
    base = os.path.basename(f)
    cap = find_caption(base)
    print(f"Uploading SMALL file via Bot API: {base}")
    subprocess.run([
        "curl", "-s", "-X", "POST",
        f"https://api.telegram.org/bot{bot_token}/sendDocument",
        "-F", f"chat_id={chat_id}",
        "-F", f"document=@{f}",
        "-F", f"caption={cap}",
        "-F", "parse_mode=HTML"
    ], check=False)

def progress(current, total, filename):
    percent = (current / total) * 100
    print(f"[+] Uploading {filename}: {percent:.2f}% ({current}/{total})")

async def upload_large(app, file_path, sem):
    async with sem:
        name = os.path.basename(file_path)
        caption = find_caption(name)[:1024]
        attempt = 1
        while attempt <= RETRIES:
            try:
                print(f"Uploading LARGE file: {name} (Attempt {attempt})")
                await app.send_document(
                    chat_id,
                    document=file_path,
                    caption=caption,
                    file_name=name,
                    force_document=True,
                    progress=progress,
                    progress_args=(name,)
                )
                print(f"Done: {name}")
                return
            except FloodWait as e:
                print(f"FloodWait {e.value}s on {name}")
                await asyncio.sleep(e.value)
            except Exception as e:
                print(f"Error uploading {name}: {e}")
                await asyncio.sleep(RETRY_DELAY)
            attempt += 1
        print(f"FAILED: {name}")

async def main():
    if not large_files:
        return
    sem = Semaphore(PARALLEL_UPLOADS)
    async with Client(
        "tg_session",
        api_id=api_id,
        api_hash=api_hash,
        session_string=session,
        max_upload_chunk_size=CHUNK_SIZE,
        workers=16
    ) as app:
        await asyncio.gather(*(upload_large(app, f, sem) for f in large_files))

asyncio.run(main())
PY
